<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Pet Virtual</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    
    <style>
        /* Desafio: Transição suave entre dia e noite usando CSS puro sobre o seu bg.png */
        body {
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: all 2s ease-in-out;
            margin: 0;
            overflow: hidden; /* Evita scroll na tela */
        }

        /* Classe para simular a noite usando filtros na imagem de fundo fornecida */
        .tema-noite {
            filter: brightness(0.4) saturate(0.8) hue-rotate(10deg);
        }

        /* Desafio Bônus: Estrelas Animadas (feitas com CSS e SVG transparente) */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background: transparent url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><circle cx="50" cy="50" r="2" fill="white" opacity="0.8"/><circle cx="200" cy="150" r="1.5" fill="white" opacity="0.6"/><circle cx="100" cy="250" r="2.5" fill="white" opacity="0.9"/></svg>') repeat;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            z-index: -1;
            animation: twinkle 3s infinite alternate;
        }
        .tema-noite-stars {
            opacity: 1;
        }

        @keyframes twinkle {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col relative">
    
    <div id="starsLayer" class="stars"></div>

    <div class="w-full flex items-center justify-between p-4 gap-4 bg-white/20 backdrop-blur-sm z-10">
        <div class="flex items-center gap-4">
            <div class="avatar">
                <div class="w-16 rounded-full ring ring-primary ring-offset-base-100 ring-offset-2 bg-white">
                    <img src="b_c.png" alt="Avatar Comendo" />
                </div>
            </div>
            <input type="text" placeholder="Nome da criatura..." class="input input-secondary bg-white/80" />
        </div>

        <div class="flex items-center gap-2 bg-white/60 px-4 py-2 rounded-xl shadow">
            <span class="text-sm font-bold text-gray-700">Dia</span>
            <input type="checkbox" id="toggleNoite" class="toggle toggle-primary" />
            <span class="text-sm font-bold text-gray-700">Noite</span>
        </div>
    </div>

    <div class="flex flex-col items-center justify-center flex-1 w-full px-4 z-10">
        
        <img 
            id="b" 
            src="b_n.png" 
            alt="Imagem principal" 
            class="w-full max-w-md h-auto drop-shadow-2xl transition-transform duration-300 hover:scale-105"
        />
        
        <div class="mt-8 flex justify-center w-full">
            <img 
                id="btn" 
                src="btn.png" 
                alt="Botão Alimentar" 
                class="w-1/3 max-w-[150px] h-auto active:scale-90 transition-transform cursor-pointer drop-shadow-xl hover:brightness-110" 
                onclick="alimentar()"
            />
        </div>
    </div>

    <button onclick="alert('Ponto Extra: Você encontrou o Ferlini (vulgo Gostosinho)!')" class="fixed bottom-2 right-2 opacity-0 hover:opacity-100 transition-opacity z-50 p-2 bg-black/50 rounded-lg text-white font-bold text-xs">
        <img src="Ferlini.jpeg" alt="Ferlini Gostosinho" class="w-8 h-8 mb-1">
        Ferlini
    </button>

    <script src="script.js"></script>
</body>
</html>
