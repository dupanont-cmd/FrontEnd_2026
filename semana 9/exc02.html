<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 02 - Conversor de Temperatura</title>
    <link rel="stylesheet" href="exc02.css">
</head>
<body>
    <div class="container">
        <h1>Conversor de Temperatura</h1>
        <p class="subtitle">Converta entre Celsius e Fahrenheit em tempo real</p>

        <div class="converter">
            <div class="input-group">
                <label for="celsius">Celsius (°C)</label>
                <input type="number" id="celsius" step="0.1" placeholder="0">
            </div>

            <div class="divider">↔</div>

            <div class="input-group">
                <label for="fahrenheit">Fahrenheit (°F)</label>
                <input type="number" id="fahrenheit" step="0.1" placeholder="32">
            </div>
        </div>
    </div>

    <script src="exc02.js"></script>
</body>
</html>
