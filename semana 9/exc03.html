<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 03 - Média Escolar</title>
    <link rel="stylesheet" href="exc03.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora de Média</h1>
        <p class="subtitle">Verifique a situação do aluno</p>

        <div class="form">
            <div class="field">
                <label for="studentName">Nome do Aluno</label>
                <input type="text" id="studentName" placeholder="Digite o nome">
            </div>

            <div class="grades-container">
                <div class="field">
                    <label for="grade1">Nota 1</label>
                    <input type="number" id="grade1" min="0" max="10" step="0.1" placeholder="0">
                </div>
                <div class="field">
                    <label for="grade2">Nota 2</label>
                    <input type="number" id="grade2" min="0" max="10" step="0.1" placeholder="0">
                </div>
                <div class="field">
                    <label for="grade3">Nota 3</label>
                    <input type="number" id="grade3" min="0" max="10" step="0.1" placeholder="0">
                </div>
            </div>

            <button id="calculateBtn">Calcular Média</button>
        </div>

        <div id="result" class="result hidden">
            <div class="result-content">
                <p id="studentInfo" class="student-info"></p>
                <p id="averageInfo" class="average-info"></p>
                <p id="statusInfo" class="status-info"></p>
            </div>
        </div>
    </div>

    <script src="exc03.js"></script>
</body>
</html>
