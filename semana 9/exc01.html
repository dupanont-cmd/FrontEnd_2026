<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 01 - Validador de CPF</title>
    <link rel="stylesheet" href="exc01.css">
</head>
<body>
    <div class="container">
        <h1>Validador de CPF</h1>
        <p class="subtitle">Verifique se seu CPF é válido</p>

        <div class="form-group">
            <input type="text" id="cpfInput" placeholder="Digite o CPF (ex: 123.456.789-00)">
            <button id="validateBtn">Validar</button>
        </div>

        <div id="result" class="result hidden">
            <p id="resultText"></p>
        </div>
    </div>

    <script src="exc01.js"></script>
</body>
</html>
