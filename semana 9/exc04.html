<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 04 - Infinity Bank</title>
    <link rel="stylesheet" href="exc04.css">
</head>
<body>
    <div class="container">
        <h1>Infinity Bank</h1>
        <p class="subtitle">Simulador de Taxas e Juros</p>

        <div class="form">
            <div class="field">
                <label for="cardBrand">Bandeira do Cartão</label>
                <select id="cardBrand">
                    <option value="">Selecione uma bandeira</option>
                    <option value="visa">Visa (2%)</option>
                    <option value="mastercard">Mastercard (1.85%)</option>
                    <option value="elo">Elo (3%)</option>
                </select>
            </div>

            <div class="field">
                <label for="amount">Valor da Venda (R$)</label>
                <input type="number" id="amount" min="0" step="0.01" placeholder="0.00">
            </div>

            <div class="field">
                <label for="installments">Número de Parcelas</label>
                <input type="number" id="installments" min="1" max="12" value="1" placeholder="1">
            </div>

            <button id="calculateBtn">Calcular</button>
        </div>

        <div id="result" class="result hidden">
            <div class="result-item">
                <span>Taxa da Bandeira:</span>
                <span id="brandTax">R$ 0.00</span>
            </div>
            <div class="result-item">
                <span>Juros Mensais:</span>
                <span id="interests">R$ 0.00</span>
            </div>
            <div class="result-item">
                <span>Taxa Fixa (12,50/mês):</span>
                <span id="fixedFee">R$ 0.00</span>
            </div>
            <div class="result-item total">
                <span>Valor da Parcela:</span>
                <span id="installmentValue">R$ 0.00</span>
            </div>
        </div>
    </div>

    <script src="exc04.js"></script>
</body>
</html>
